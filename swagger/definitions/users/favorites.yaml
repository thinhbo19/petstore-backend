paths:
  /api/user/listfav:
    get:
      summary: Lấy danh sách yêu thích
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách yêu thích

  /api/user/favoritePet:
    put:
      summary: Thêm/xóa thú cưng yêu thích
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [petId]
              properties:
                petId:
                  type: string
      responses:
        '200':
          description: Cập nhật yêu thích thành công

