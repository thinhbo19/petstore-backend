paths:
  /api/user/register:
    post:
      summary: Đăng ký tài khoản mới
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, username, mobile]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: "Ít nhất 8 ký tự, bao gồm chữ và số"
                username:
                  type: string
                mobile:
                  type: string
      responses:
        '200':
          description: Đăng ký thành công, yêu cầu kích hoạt OTP
        '400':
          description: Thiếu dữ liệu hoặc email đã tồn tại

  /api/user/verify-otp:
    post:
      summary: Kích hoạt tài khoản bằng OTP
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                otp:
                  type: string
      responses:
        '200':
          description: Kích hoạt thành công
        '400':
          description: OTP sai/hết hạn/thiếu dữ liệu

  /api/user/resend-otp:
    post:
      summary: Gửi lại OTP
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Gửi OTP thành công
        '400':
          description: Email không tồn tại

  /api/user/login:
    post:
      summary: Đăng nhập
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Đăng nhập thành công, trả về accessToken & refreshToken
        '400':
          description: Sai tài khoản hoặc mật khẩu

  /api/user/logout:
    get:
      summary: Đăng xuất
      tags: [Users]
      responses:
        '200':
          description: Đăng xuất thành công

  /api/user/refreshtoken:
    post:
      summary: Làm mới access token
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token mới được tạo
        '401':
          description: Token không hợp lệ

  /api/user/forgotpassword:
    post:
      summary: Quên mật khẩu
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Email reset password đã được gửi

  /api/user/resetpassword:
    post:
      summary: Đặt lại mật khẩu
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Đặt lại mật khẩu thành công

  /api/user/verify-reset-token:
    post:
      summary: Xác thực token reset password
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token hợp lệ
        '400':
          description: Token không hợp lệ

  /api/user/change-password:
    put:
      summary: Thay đổi mật khẩu
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Thay đổi mật khẩu thành công
        '400':
          description: Mật khẩu cũ sai

