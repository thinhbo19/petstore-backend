paths:
  /api/user/cart:
    put:
      summary: Cập nhật giỏ hàng
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                quantity:
                  type: number
      responses:
        '200':
          description: Cập nhật giỏ hàng thành công

  /api/user/allCart:
    delete:
      summary: Xóa toàn bộ giỏ hàng
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Xóa giỏ hàng thành công

  /api/user/allOneCart:
    delete:
      summary: Xóa một sản phẩm khỏi giỏ hàng
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
      responses:
        '200':
          description: Xóa sản phẩm khỏi giỏ hàng thành công

