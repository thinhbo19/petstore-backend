paths:
  /api/user/getCart:
    get:
      summary: Lấy giỏ hàng của người dùng
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lấy giỏ hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        images:
                          type: string
                        quantity:
                          type: number
                          example: 1
                        price:
                          type: number
                          example: 100000
        responses:
          "401":
            description: Unauthorized
          "500":
            description: Internal Server Error
          "200":
            description: Lấy giỏ hàng thành công

  /api/user/cart:
    put:
      summary: Cập nhật giỏ hàng
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                quantity:
                  type: number
      responses:
        "200":
          description: Cập nhật giỏ hàng thành công

  /api/user/deleteAllCart:
    delete:
      summary: Xóa toàn bộ giỏ hàng
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Xóa giỏ hàng thành công

  /api/user/deleteOneCart:
    delete:
      summary: Xóa một sản phẩm khỏi giỏ hàng
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Xóa sản phẩm khỏi giỏ hàng thành công
