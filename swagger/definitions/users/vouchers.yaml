paths:
  /api/user/add-voucher:
    put:
      summary: Thêm voucher vào tài khoản
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [voucherId]
              properties:
                voucherId:
                  type: string
      responses:
        '200':
          description: Thêm voucher thành công

  /api/user/vouchers:
    get:
      summary: Lấy danh sách voucher của người dùng
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách voucher

