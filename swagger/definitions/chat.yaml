tags:
  - name: Chat
    description: Quản lý phòng chat

paths:
  /api/chat:
    post:
      summary: Admin — đồng bộ chat 1-1 cho user và staff
      description: |
        Chỉ tài khoản Admin. Không cần body: server duyệt mọi user,
        gán staff (nếu thiếu) và tạo/đảm bảo phòng chat 1-1.
      tags: [Chat]
      responses:
        '200':
          description: Danh sách chat đã xử lý (total, chats)
        '403':
          description: Không phải Admin

  /api/chat/{_id}:
    delete:
      summary: Xóa phòng chat theo ID
      tags: [Chat]
      parameters:
        - in: path
          name: _id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Xóa thành công

  /api/chat/findone/{_id}:
    get:
      summary: Tìm một phòng chat theo ID
      tags: [Chat]
      parameters:
        - in: path
          name: _id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thông tin phòng chat

  /api/chat/{userId}:
    get:
      summary: Tìm phòng chat của người dùng
      tags: [Chat]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Danh sách phòng chat

  /api/chat/conversation/{firstId}/{secondId}:
    get:
      summary: Tìm phòng chat giữa hai người dùng
      tags: [Chat]
      parameters:
        - in: path
          name: firstId
          required: true
          schema:
            type: string
        - in: path
          name: secondId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thông tin phòng chat
