tags:
  - name: PetSpecies
    description: Quản lý loài thú cưng

paths:
  /api/petSpecies/addNewSpecies:
    post:
      summary: Tạo loài thú cưng mới (Admin only)
      tags: [PetSpecies]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nameSpecies]
              properties:
                nameSpecies:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Tạo loài thành công

  /api/petSpecies/getAllSpecies:
    get:
      summary: Lấy danh sách tất cả loài
      tags: [PetSpecies]
      responses:
        '200':
          description: Danh sách loài

  /api/petSpecies/changeSpecies/{psid}:
    put:
      summary: Cập nhật loài (Admin only)
      tags: [PetSpecies]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: psid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nameSpecies:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Cập nhật thành công

  /api/petSpecies/{psid}:
    delete:
      summary: Xóa loài (Admin only)
      tags: [PetSpecies]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: psid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Xóa thành công

